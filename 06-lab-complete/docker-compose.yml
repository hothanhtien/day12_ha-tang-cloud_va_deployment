services:

  # ── AI Agent (FastAPI) ───────────────────────────────────
  # build context = thư mục cha (chứa utils/), dockerfile = trong 06-lab-complete/
  # Lý do: main.py import "from utils.mock_llm import ask" — utils/ phải có trong image
  backend:
    build:
      context: ..
      dockerfile: 06-lab-complete/Dockerfile
    expose:
      - "8000"
    environment:
      - ENVIRONMENT=production
      - APP_NAME=Production AI Agent
      - REDIS_URL=redis://redis:6379/0
    env_file:
      - .env.local
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  # ── Redis ────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped

  # ── Nginx (reverse proxy + static files) ─────────────────
  nginx:
    image: nginx:alpine
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./index.html:/usr/share/nginx/html/index.html:ro
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  # ── Cloudflare Tunnel ────────────────────────────────────
  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run
    volumes:
      - ../cloudflared:/etc/cloudflared:ro
    depends_on:
      - nginx
    restart: unless-stopped

volumes:
  redis-data:
